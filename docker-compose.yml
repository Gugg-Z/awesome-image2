services:
  postgres:
    image: postgres:16-alpine
    container_name: promptbay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: promptbay
      POSTGRES_PASSWORD: promptbay
      POSTGRES_DB: promptbay
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
